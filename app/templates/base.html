<!doctype html> <!-- Tell the browser this document uses modern HTML 5 -->
<html lang="en"> <!-- Start the HTML document and set the language to English -->
<head>  <!-- Start the head section with metadata and external files -->
    <meta charset="utf-8">  <!-- Set the character enconding to support normal text characters -->
    <meta name="viewport" content="width=device-width, initial-scale=1"> <!-- Make the layout responsive on mobile devices -->
    <title>{% block title %}The Only Tee{% endblock %}</title> <!-- Set a default page title that child templates can replace -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> <!-- Load Bootstrap CSS from the official CDN -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css')  }}"> <!-- Load the custom CSS file from the Flask static folder -->
</head> <!-- End the head section -->
<body> <!-- Start the visible page body -->
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom"> <!-- Create a responsive Bootstrap navigation bar -->
    <div class="container">  <!-- Center the navbar content inside a Bootstrap container -->
        <a class="navbar-brand fw-bold" href="{{ url_for('main.home') }}">THE ONLY TEE</a> <!-- Add the brand link that points to the homepage -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavBar"> <!-- Add the mobile menu toggle button -->
            <span class="navbar-toggler-icon"></span>  <!-- Display the default Bootstrap hamburger icon -->
        </button> <!-- Close the mobile menu button -->
        <div class="collapse navbar-collapse" id="mainNavbar"> <!-- Create the collapsible menu area for smaller screens -->
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0"> <!-- Create a right aligned Bootstrap navigation list -->
                <li class="nav-item"> <!-- Create a navigation list item -->
                    <a class="nav-link" href="{{ url_for('main.home') }}">Current Drop</a> <!-- Link to the current active drop page -->
                </li> <!-- Close the navigation list item -->
                <li class="nav-item"> <!-- Create one navigation list item -->
                    <a class="nav-link" href="{{ url_for('main.about') }}">About</a> <!-- Link to the about page -->
                </li> <!-- Close the navigation list item -->
            </ul> <!-- Close the navigation list -->
        </div> <!-- Close the collapsible navbar area -->
    </div> <!-- Close the Bootstrap container -->
</nav> <!-- Close the navigation bar -->

<main> <!-- Start the main content area of the page -->
    {% block content %}{% endblock %} <!-- Define a content block that child templates will replace -->
</main> <!-- End the main content area -->

<footer class="border-top py-4 mt-5"> <!-- Create a simple footer with a top border and spacing -->
    <div class="container d-flex flex-column flex-md-row justify-content-between gap-2"> <!-- Create a responsive footer container -->
        <p class="mb-0 small text-muted">© 2026 THE ONLY TEE. All rights reserved.</p> <!-- Display the copyright text -->
        <p class="mb-0 small text-muted">Automated limited-drop product platform.</p> <!-- Display a short project description -->
    </div> <!-- Close the footer container -->
</footer> <!-- Close the footer -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> <!-- Load Bootstrap JavaScript for responsive components -->
</body> <!-- End the visible page body -->
</html> <!-- End the HTML document -->
